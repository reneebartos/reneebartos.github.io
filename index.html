<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renee Bartos | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* 1. RESET & BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1a1a1a; line-height: 1.6; }

        /* 2. HERO SECTION */
        .hero {
            display: flex;
            height: 50vh;
            min-height: 350px;
            background-color: #000000;
            overflow: hidden;
        }
        .hero-left {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 8%;
            background-color: #000000;
        }
        .hero-right {
            width: 50%;
            position: relative;
            background-color: #000000;
        }
        .name-brand {
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            font-weight: 900;
            line-height: 0.9;
            color: #ffffff;
            text-transform: uppercase;
        }
        .subtitle {
            font-size: 0.9rem;
            margin-top: 15px;
            color: #a855f7;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
        }
        .hero-right img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 15%;
        }
        /* Gradient Overlay */
        .hero-right::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, #000000 0%, rgba(168, 85, 247, 0.2) 50%, rgba(0,0,0,0) 100%);
        }

        .container { padding: 80px 8%; max-width: 1200px; margin: 0 auto; }

        .lead-text { font-size: 1.4rem; margin-bottom: 60px; color: #333; max-width: 800px; }
        .card { margin-bottom: 40px; padding-left: 20px; border-left: 4px solid #a855f7; }
