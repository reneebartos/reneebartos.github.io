<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renee Bartos | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff; 
            color: #1a1a1a; 
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* The Seamless Hero Container */
        .hero-container {
            display: flex;
            min-height: 80vh;
            width: 100%;
            background-color: #000; /* Core black background */
            position: relative;
        }

        /* Left Side: Branding */
        .hero-branding {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 8%;
            z-index: 10; /* Keeps text above the fade */
            background-color: #000;
        }

        .name-brand {
            font-size: clamp(3rem, 8vw, 6.5rem);
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -3px;
            text-transform: uppercase;
            color: #ffffff;
        }

        .subtitle {
            font-size: 1.1rem;
            margin-top: 30px;
            color: #a855f7;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 700;
        }

        /* Right Side: The Photo with the Fade Effect */
        .hero-photo-wrapper {
            width: 50%;
            position: relative;
            overflow: hidden;
            background-color: #000;
        }

        .hero-photo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 15%;
            /* This creates the fade from the left side */
            mask-image: linear-gradient(to right, transparent, black 40%);
            -webkit-mask-image: linear-gradient(to right, transparent, black 40%);
        }

        /* The Purple Tint Overlay (also faded to match) */
        .hero-photo-wrapper::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.4) 0%, rgba(0, 0, 0, 0.8) 100%);
            mask-image: linear-gradient(to right, transparent, black 40%);
            -webkit-mask-image: linear-gradient(to right, transparent, black 40%);
            pointer-events: none;
        }

        /* Content Area */
        .container { padding: 100px 8%; max-width: 1200px; }

        .lead-text { font-size: 1.5rem; margin-bottom: 60px; color: #333; max-width: 800px; }
        .job-card { margin-bottom: 50px; padding-left: 25px; border-left: 4px solid #a855f7; }
