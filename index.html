<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renee Bartos | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff; 
            color: #1a1a1a; 
            line-height: 1.6;
        }

        /* 1. Cinematic Hero */
        .hero-container {
            display: flex;
            height: 50vh; 
            min-height: 400px;
            width: 100%;
            background-color: #000000;
            overflow: hidden;
        }

        .hero-branding {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 8%;
            background-color: #000000;
            z-index: 2;
        }

        .name-brand {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -2px;
            text-transform: uppercase;
            color: #ffffff;
        }

        .subtitle {
            font-size: 0.9rem;
            margin-top: 15px;
            color: #a855f7;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
        }

        .hero-photo-wrapper {
            width: 50%;
            position: relative;
            background-color: #000000;
        }

        .hero-photo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 15%;
            display: block;
        }

        .hero-photo-wrapper::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, #000000 0%, rgba(168, 85, 247, 0.2) 50%, rgba(0,0,0,0) 100%);
            pointer-events: none;
        }

        /* 2. Main Content */
