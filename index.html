<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renee Bartos | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1a1a1a; line-height: 1.6; }

        /* 1. Cinematic Hero - Proximity Focus */
        .hero-container {
            display: flex;
            height: 50vh;
            min-height: 400px;
            width: 100%;
            background-color: #000000;
            overflow: hidden;
            position: relative;
        }

        .hero-branding {
            width: 45%; /* Slightly wider to give text room but keep photo close */
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 4% 0 8%;
            background-color: #000000;
            z-index: 5;
        }

        .name-brand {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -2px;
            text-transform: uppercase;
            color: #ffffff;
        }

        .subtitle {
            font-size: 0.85rem;
            margin-top: 15px;
            color: #a855f7;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
        }

        .hero-photo-wrapper {
            width: 55%;
            position: relative;
            background-color: #000000;
            overflow: hidden;
        }

        .hero-photo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* This centers your face in the frame */
            object-position: center 22%; 
            display: block;
            /* This zooms the photo slightly to pull you closer to the center line */
            transform: scale(1.3);
            transform-origin: left center;
        }

        /* Seamless Fade Overlay - Bridges the gap between text and face */
        .hero-photo-wrapper::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, #000000 0%, rgba(0,0,0,0) 40%);
            z-index: 2;
        }
