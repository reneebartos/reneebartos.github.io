<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renee Bartos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: #ffffff; color: #1a1a1a; }
        .top { display: flex; height: 50vh; min-height: 400px; background: #000; overflow: hidden; }
        .top-left { width: 45%; display: flex; flex-direction: column; justify-content: center; padding-left: 8%; }
        .top-right { width: 55%; position: relative; }
        .top-right img { width: 100%; height: 100%; object-fit: cover; object-position: center 25%; }
        .top-right::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to right, #000, transparent 40%); }
        h1 { color: #fff; font-size: 4rem; font-weight: 900; margin: 0; line-height: 0.9; }
        .tag { color: #a855f7; font-weight: 700; margin-top: 15px; letter-spacing: 2px; text-transform: uppercase; font-size: 0.9rem; }
        .content { padding: 80px 8%; max-width: 1100px; }
        h2 { border-bottom: 8px solid #a855f7; display: inline-block; font-size: 2rem; margin-bottom: 30px; }
        .job { border-left: 4px solid #a855f7; padding-left: 20px; margin-bottom: 40px; }
        .footer { background: #000; color: #fff; padding: 60px 8%; text-align: center; }
        .btn { display: inline-block; padding: 15px 30px; background: #a855f7; color: #fff; text-decoration: none; font-weight: 900; border-radius: 4px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="top">
        <div class="top-left">
            <h1>RENEE<br>BARTOS</h1>
            <div class="tag">Operations • Success • Strategy</div>
        </div>
        <div class="top-right">
            <img src="wmremove-transformed.png">
        </div>
    </div>
    <div class="content">
        <h2>PHILOSOPHY</h2>
        <p style="font-size: 1.4rem; margin-bottom: 50px;">I bridge the gap between technical complexity and business value.</p>
        <h2>IMPACT</h2>
        <div class="job">
            <p><strong>Technical Operations Lead</strong><br>ReportAll USA | 2022 – 2025</p>
        </div>
        <div class="job">
            <p><strong>Customer Operations Specialist</strong><br>Northern Grace | 2017 – 2021</p>
        </div>
    </div>
    <div class="footer">
        <a href="https://www.linkedin.com/in/renee-bartos" class="btn">LinkedIn</a>
    </div>
</body>
</html>
