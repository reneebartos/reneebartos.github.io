<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renee Bartos | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1a1a1a; line-height: 1.6; }

        .hero-container {
            display: flex;
            height: 450px;
            width: 100%;
            background-color: #000;
            overflow: hidden;
        }

        .hero-left {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 8%;
        }

        .hero-right {
            width: 50%;
            position: relative;
        }

        .name-brand {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 0.9;
            color: #fff;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.8rem;
            margin-top: 15px;
            color: #a855f7;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
        }

        .hero-right img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 22%;
        }

        .hero-right::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, #000, transparent 40%);
        }

        .container { padding: 60px 8%; max-width: 1100px; margin: 0 auto; }
        h2 { font-size: 1.8rem; font-weight: 900; margin-bottom: 25px; text-transform: uppercase; border-bottom: 6px solid #a855f7; display: inline-block; }
        .lead { font-size: 1.3rem; margin-bottom: 50px; color: #333; }
        .card { margin-bottom: 35px; padding-left: 20px; border-left: 4px solid #a855f7; }
        .card-h { font-size: 1.3rem; font-weight: 900; text-transform: uppercase; }
        .card-s { font-weight: 700; color: #a855f7; font-size: 0.8rem; margin-bottom: 8px; text-transform: uppercase; }

        .footer { background-color: #000; color: #fff; padding: 60px 8%; text-align: center; }
        .btn { display: inline-block; padding: 15px 30px; background: #a855f7; color: #fff !important; text-decoration: none; font-weight: 900; text-transform: uppercase; border-radius: 4px; }

        @media (max-width: 768px) {
            .hero-container { flex-direction: column; height: auto; }
            .hero-left, .hero-right { width: 100%; }
            .hero-right { height: 300px; }
        }
    </style>
</head>
<body>

    <div class="hero-container">
        <div class="hero-left">
            <h1 class="name-brand">RENEE<br>BARTOS</h1>
            <p class="subtitle">Operations • Success • Strategy</p>
        </div>
        <div class="hero-right">
            <img src="wmremove-transformed.png">
        </div>
    </div>
