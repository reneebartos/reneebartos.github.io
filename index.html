<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renee Bartos | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* 1. Global Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff; 
            color: #1a1a1a; 
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 2. Split-Screen Hero Section */
        .hero-container {
            display: flex;
            min-height: 80vh; /* Made slightly taller to fit the photo better */
            width: 100%;
            background-color: #000;
        }

        /* Left Side: Branding */
        .hero-branding {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 8%;
        }

        .name-brand {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -3px;
            text-transform: uppercase;
            color: #ffffff;
        }

        .subtitle {
            font-size: 1.1rem;
            margin-top: 30px;
            color: #a855f7; /* Electric Purple */
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 700;
        }

        /* Right Side: The Photo Wrapper */
        .hero-photo-wrapper {
            width: 50%;
            position: relative;
            overflow: hidden;
            background-color: #000;
            display: flex;
        }

        .hero-photo-wrapper img {
            width: 100%;
            height: 100%;
            /* This tells the browser to focus on the top of the photo (your face) */
            object-fit: cover;
            object-position: center 15%; 
        }

        /* The Purple Tint Overlay */
        .hero-photo-wrapper::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.3) 0%, rgba(0, 0, 0, 0.7) 100%);
            pointer-events: none;
        }

        /* 3. Content Area Styles */
        .container {
            padding: 100px 8%;
            max-width: 1200px;
        }
