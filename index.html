<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renee Bartos | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Wix-Style Global Resets */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff; 
            color: #1a1a1a; 
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* High-Impact Hero Section */
        .hero {
            background-color: #000000;
            color: #ffffff;
            padding: 100px 10%;
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .name-brand {
            font-size: clamp(3.5rem, 12vw, 7.5rem);
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -4px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 1.2rem;
            margin-top: 30px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 400;
        }

        /* Content Structure */
        .container {
            padding: 100px 10%;
            max-width: 1200px;
        }

        h2 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 50px;
            text-transform: uppercase;
            border-bottom: 15px solid #000;
            display: inline-block;
            letter-spacing: -1px;
        }

        .lead-text {
            font-size: 1.75rem;
            font-weight: 400;
            margin-bottom: 80px;
            max-width: 800px;
            color: #333;
        }

        /* Experience Cards */
        .experience-grid {
            display: grid;
            gap: 60px;
            margin-bottom: 80px;
        }

        .job-card {
            border-left: 4px solid #000;
            padding-left: 30px;
        }
