<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renee Bartos | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1a1a1a; line-height: 1.6; }

        /* 1. Stable Hero - 50/50 Split */
        .hero-container {
            display: flex;
            height: 50vh;
            min-height: 400px;
            width: 100%;
            background-color: #000000;
            overflow: hidden;
        }

        .hero-branding {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 8%;
            background-color: #000000;
            z-index: 2;
        }

        .name-brand {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -2px;
            text-transform: uppercase;
            color: #ffffff;
        }

        .subtitle {
            font-size: 0.9rem;
            margin-top: 15px;
            color: #a855f7;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
        }

        .hero-photo-wrapper {
            width: 50%;
            position: relative;
            background-color: #000000;
        }

        .hero-photo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* This centers your face perfectly in the right-side box */
            object-position: center 22%; 
            display: block;
        }

        /* The Fade Overlay */
        .hero-photo-wrapper::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, #000000 0%, rgba(168, 85, 247, 0.1) 30%, rgba(0,0,0,0) 100%);
            pointer-events: none;
        }

        /* 2. Content Area */
        .container { padding: 80px 8%; max-width: 1200px; margin: 0 auto; }
        h2 { font-size: 2rem; font-weight: 900; margin-bottom: 30px; text-transform: uppercase; border-bottom: 8px solid #a855f7; display: inline-block; }
        .lead-text { font-size: 1.4rem; margin-bottom: 60px; color: #333; max-width: 800px; }
        .
