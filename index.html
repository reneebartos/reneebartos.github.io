<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renee Bartos | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1a1a1a; line-height: 1.6; }

        /* 1. The Hero - Dynamic & Stable */
        .hero-container {
            display: flex;
            width: 100%;
            background-color: #000000;
            /* Height is now flexible to prevent weird cropping */
            min-height: 450px; 
            overflow: hidden;
        }

        .hero-branding {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 8%;
            background-color: #000000;
        }

        .name-brand {
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -2px;
            text-transform: uppercase;
            color: #ffffff;
        }

        .subtitle {
            font-size: 0.9rem;
            margin-top: 20px;
            color: #a855f7;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 700;
        }

        /* Photo Area */
        .hero-photo-wrapper {
            width: 50%;
            position: relative;
            display: flex;
            align-items: center; /* Centers photo vertically */
            justify-content: center;
        }

        .hero-photo-wrapper img {
            width: 100%;
            height: 100%;
            /* 'Cover' ensures the box is filled, but we've increased height to show more face */
            object-fit: cover;
            object-position: center center; 
            display: block;
        }

        /* Subtle Fade */
        .hero-photo-wrapper::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, #000000 0%, rgba(0,0,0,0) 40%);
        }

        /* 2. Content */
        .container { padding: 80px 8%; max-width: 1200px; margin: 0 auto; }
        h2 { font-size: 2.2rem; font-weight: 900; margin-bottom: 35px; text-transform: uppercase; border-bottom: 10px solid #a855f7; display: inline-block; }
