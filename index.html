<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renee Bartos | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Essential Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff; 
            color: #1a1a1a; 
            line-height: 1.6;
        }

        /* 1. Hero Section */
        .hero-container {
            display: flex;
            min-height: 80vh;
            width: 100%;
            background-color: #000000;
        }

        /* Left Side */
        .hero-branding {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 8%;
            background-color: #000000;
            z-index: 2;
        }

        .name-brand {
            font-size: clamp(3rem, 8vw, 6.5rem);
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -3px;
            text-transform: uppercase;
            color: #ffffff;
        }

        .subtitle {
            font-size: 1.1rem;
            margin-top: 30px;
            color: #a855f7;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 700;
        }

        /* Right Side with Fade */
        .hero-photo-wrapper {
            width: 50%;
            position: relative;
            background-color: #000000;
        }

        .hero-photo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 15%;
            display: block;
        }

        /* The Overlay: Creates the fade from the black side into the photo */
        .hero-photo-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Fades from pure black on the left to transparent purple on the right */
            background: linear-gradient(to right, #000000 0%, rgba(168, 85, 247, 0.2) 50%, rgba(0,0,0,0) 100%);
            pointer-events: none;
        }

        /* 2. Body Content */
        .container { padding: 100px 8%; max-width: 1200px; }
        h2 { font-size: 2.5rem; font-weight: 900; margin-bottom: 40px; text-transform: uppercase; border-bottom: 12px solid #a855f7; display: inline-block; }
        .lead-text { font-size: 1.5rem; margin-bottom: 60px; color: #333; max-width: 800px; }
        .job-card { margin-bottom: 50px; padding-left: 25px; border-left: 4px solid #a855f7; }
        .job-title { font-size: 1.5rem; font-weight: 900; text-transform: uppercase; }
        .company-tag { font-weight: 700; color: #a855f7; font-size: 0.9rem; margin-bottom: 15px; text-transform: uppercase; }

        /* 3. Footer */
        .footer { background-color: #000; color: #fff; padding: 100px 8%; text-align: center; }
